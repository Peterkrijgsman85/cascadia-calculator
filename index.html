<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascadia Score App</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--primary); 
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 10px; }
        
        .setup { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        /* De Grid Layout */
        .score-table { 
            display: grid; 
            gap: 1px; /* Creëert subtiele lijnen */
            background-color: var(--border);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            background: white;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-cell {
            background: #f1f5f9;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #64748b;
        }

        .label-cell {
            justify-content: flex-start;
            font-weight: 600;
            background: #fdfdfd;
        }

        /* Inputs styling */
        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        /* Totaal-sectie */
        .total-label {
            background: #1e293b;
            color: white;
            font-weight: bold;
        }

        .total-cell {
            background: var(--accent);
            color: white;
        }

        .total-cell input {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-weight: bold;
            pointer-events: none;
        }

        .btn-reset {
            margin-top: 25px;
            width: 100%;
            padding: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-reset:hover { opacity: 0.9; }

        select {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Cascadia Score Calculator</h1>

    <div class="setup">
        <label>Aantal spelers: </label>
        <select id="playerCount" onchange="initApp()">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>

    <div id="scoreTable" class="score-table">
        </div>

    <button class="btn-reset" onclick="resetScores()">Reset Alle Scores</button>
</div>

<script>
    const categories = [
        { id: 'bear', name: '🐻 Beren' },
        { id: 'elk', name: '🦌 Elanden' },
        { id: 'hawk', name: '🦅 Haviken' },
        { id: 'fox', name: '🦊 Vossen' },
        { id: 'salmon', name: '🐟 Zalmen' },
        { id: 'habitat', name: '🏞 Habitat' },
        { id: 'tokens', name: '🌲 Tokens' }
    ];

    function initApp() {
        const numPlayers = parseInt(document.getElementById('playerCount').value);
        const table = document.getElementById('scoreTable');
        
        // Update de grid-kolommen dynamisch
        table.style.gridTemplateColumns = `180px repeat(${numPlayers}, 1fr)`;
        
        let html = '';

        // 1. Headers
        html += `<div class="cell header-cell">Categorie</div>`;
        for (let i = 1; i <= numPlayers; i++) {
            html += `<div class="cell header-cell">Speler ${i}</div>`;
        }

        // 2. Categorie rijen
        categories.forEach(cat => {
            html += `<div class="cell label-cell">${cat.name}</div>`;
            for (let i = 1; i <= numPlayers; i++) {
                html += `
                <div class="cell">
                    <input type="number" class="score-input p${i}" value="0" min="0" oninput="calculate()">
                </div>`;
            }
        });

        // 3. Totaal rij
        html += `<div class="cell label-cell total-label">EINDTOTAAL</div>`;
        for (let i = 1; i <= numPlayers; i++) {
            html += `
            <div class="cell total-cell">
                <input type="number" id="total-p${i}" value="0" readonly>
            </div>`;
        }

        table.innerHTML = html;
    }

    function calculate() {
        const numPlayers = document.getElementById('playerCount').value;
        for (let i = 1; i <= numPlayers; i++) {
            let total = 0;
            document.querySelectorAll(`.p${i}`).forEach(input => {
                total += parseInt(input.value) || 0;
            });
            document.getElementById(`total-p${i}`).value = total;
        }
    }

    function resetScores() {
        document.querySelectorAll('.score-input').forEach(input => input.value = 0);
        calculate();
    }

    initApp();
</script>

</body>
</html>
